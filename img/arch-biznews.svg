<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 235" font-family="'Pretendard Variable',Pretendard,system-ui,sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#5eead4"/>
    </marker>
    <marker id="b" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#c8c5c2"/>
    </marker>
    <marker id="y" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="520" height="235" fill="#f8fffe" rx="10"/>
  <text x="12" y="16" font-size="9" font-weight="700" fill="#0f766e" letter-spacing=".1em">Biz_News · AI NEWS PIPELINE</text>

  <!-- 뉴스 소스 (external) -->
  <rect x="12" y="26" width="88" height="44" rx="6" fill="#fef9c3" stroke="#fde047"/>
  <text x="56" y="44" text-anchor="middle" font-size="8.5" font-weight="700" fill="#854d0e">뉴스 소스</text>
  <text x="56" y="57" text-anchor="middle" font-size="7.5" fill="#92400e">RSS / 공공 API</text>

  <!-- 뉴스소스 → FastAPI -->
  <line x1="101" y1="48" x2="119" y2="48" stroke="#5eead4" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- FastAPI AI Service -->
  <rect x="120" y="20" width="200" height="90" rx="6" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
  <text x="220" y="35" text-anchor="middle" font-size="8.5" font-weight="700" fill="#0f766e">FastAPI AI Service</text>

  <!-- inner: 뉴스 크롤러 -->
  <rect x="130" y="40" width="84" height="22" rx="4" fill="white" stroke="#99f6e4"/>
  <text x="172" y="51" text-anchor="middle" font-size="7.5" font-weight="600" fill="#44403c">뉴스 크롤러</text>
  <text x="172" y="61" text-anchor="middle" font-size="7" fill="#78716c">수집 · 파싱</text>

  <!-- inner: LangChain -->
  <rect x="226" y="40" width="84" height="22" rx="4" fill="white" stroke="#99f6e4"/>
  <text x="268" y="51" text-anchor="middle" font-size="7.5" font-weight="600" fill="#44403c">LangChain</text>
  <text x="268" y="61" text-anchor="middle" font-size="7" fill="#78716c">요약 · 임베딩</text>

  <!-- pipeline annotation -->
  <text x="220" y="76" text-anchor="middle" font-size="7" fill="#0f766e">수집 → 요약 → 임베딩 → 추천</text>
  <text x="220" y="88" text-anchor="middle" font-size="7" fill="#78716c">비동기 파이프라인</text>

  <!-- FastAPI → OpenAI -->
  <line x1="321" y1="51" x2="339" y2="51" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#y)"/>

  <!-- OpenAI API (external) -->
  <rect x="340" y="26" width="168" height="44" rx="6" fill="#fef9c3" stroke="#fde047"/>
  <text x="424" y="44" text-anchor="middle" font-size="8.5" font-weight="700" fill="#854d0e">OpenAI API</text>
  <text x="424" y="57" text-anchor="middle" font-size="7.5" fill="#92400e">GPT-4o · text-embedding</text>

  <!-- FastAPI → Spring Boot -->
  <line x1="220" y1="111" x2="220" y2="129" stroke="#5eead4" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Spring Boot REST API -->
  <rect x="120" y="130" width="200" height="46" rx="6" fill="white" stroke="#e7e5e4"/>
  <text x="220" y="148" text-anchor="middle" font-size="8.5" font-weight="700" fill="#44403c">Spring Boot REST API</text>
  <text x="220" y="162" text-anchor="middle" font-size="7.5" fill="#78716c">뉴스 조회 · 추천 · 기업 그래프</text>

  <!-- Spring Boot → Client -->
  <line x1="321" y1="153" x2="339" y2="153" stroke="#c8c5c2" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- Client -->
  <rect x="340" y="130" width="90" height="46" rx="6" fill="white" stroke="#e7e5e4"/>
  <text x="385" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#44403c">Client</text>
  <text x="385" y="163" text-anchor="middle" font-size="7.5" fill="#78716c">Web / Mobile</text>

  <!-- Spring Boot → Data Layer -->
  <line x1="220" y1="177" x2="220" y2="191" stroke="#c8c5c2" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#b)"/>

  <!-- Data Layer bar -->
  <rect x="12" y="192" width="496" height="36" rx="6" fill="white" stroke="#e7e5e4"/>
  <text x="18" y="208" font-size="8" font-weight="700" fill="#44403c">Data Layer</text>

  <rect x="72" y="198" width="100" height="24" rx="4" fill="#f5f5f4" stroke="#e7e5e4"/>
  <text x="122" y="214" text-anchor="middle" font-size="8" font-weight="600" fill="#44403c">Neo4j</text>

  <rect x="182" y="198" width="82" height="24" rx="4" fill="#f5f5f4" stroke="#e7e5e4"/>
  <text x="223" y="214" text-anchor="middle" font-size="8" font-weight="600" fill="#44403c">Redis</text>

  <rect x="274" y="198" width="122" height="24" rx="4" fill="#f5f5f4" stroke="#e7e5e4"/>
  <text x="335" y="214" text-anchor="middle" font-size="8" font-weight="600" fill="#44403c">Docker Compose</text>
</svg>
